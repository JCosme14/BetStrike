services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Admin123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./db-init:/db-init
    command: >
      bash -c "
        /opt/mssql/bin/sqlservr &
        sleep 30 &&
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Admin123!' -C -i /db-init/FPF.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Admin123!' -C -i /db-init/Apostas.sql &&
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Admin123!' -C -i /db-init/Pagamentos.sql &&
        wait
      "
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Admin123!", "-C", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10
      start_period: 40s

  results-api:
    build:
      context: .
      dockerfile: ResultsAPI/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__FPF=Server=sqlserver;Database=FPF;User Id=sa;Password=Admin123!;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Container
    depends_on:
      sqlserver:
        condition: service_healthy

  betting-api:
    build:
      context: .
      dockerfile: BettingAPI/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__Apostas=Server=sqlserver;Database=Apostas;User Id=sa;Password=Admin123!;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Container
    depends_on:
      sqlserver:
        condition: service_healthy

  payments-api:
    build:
      context: .
      dockerfile: PaymentsAPI/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ConnectionStrings__Pagamentos=Server=sqlserver;Database=Pagamentos;User Id=sa;Password=Admin123!;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Container
    depends_on:
      sqlserver:
        condition: service_healthy

  data-generator:
    build:
      context: .
      dockerfile: DataGenerator/Dockerfile
    environment:
      - ResultsAPI__BaseUrl=http://results-api:8080
      - BettingAPI__BaseUrl=http://betting-api:8080
      - ASPNETCORE_ENVIRONMENT=Container
    depends_on:
      results-api:
        condition: service_started
      betting-api:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8000:80"
    environment:
      - REACT_APP_RESULTS_API=http://results-api:8080
      - REACT_APP_BETTING_API=http://betting-api:8080
      - REACT_APP_PAYMENTS_API=http://payments-api:8080
    depends_on:
      - results-api
      - betting-api
      - payments-api
    networks:
      - default

volumes:
  sqldata: